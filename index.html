<!DOCTYPE html>
<html>
<head>
  <title>Idle Miner Optimizer</title>
  <style>
    body {
      font-family: Arial;
      background: #121212;
      color: white;
      text-align: center;
      padding: 30px;
    }
    input {
      margin: 5px;
      padding: 8px;
      border-radius: 5px;
      border: none;
    }
    button {
      padding: 10px 20px;
      background: #00ff99;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    .box {
      background: #1e1e1e;
      padding: 20px;
      border-radius: 10px;
      display: inline-block;
    }
  </style>
</head>
<body>

<h1>⛏️ Idle Miner Optimizer</h1>

<div class="box">
  <h3>Puits</h3>
  <input id="s1" type="number" placeholder="Puits 1"><br>
  <input id="s2" type="number" placeholder="Puits 2"><br>
  <input id="s3" type="number" placeholder="Puits 3"><br>

  <h3>Transport</h3>
  <input id="elevator" type="number" placeholder="Ascenseur"><br>
  <input id="warehouse" type="number" placeholder="Entrepôt"><br><br>

  <button onclick="calc()">Optimiser</button>

  <h2 id="result"></h2>
</div>

<script>
function calc() {
  let s1 = parseInt(document.getElementById("s1").value) || 0;
  let s2 = parseInt(document.getElementById("s2").value) || 0;
  let s3 = parseInt(document.getElementById("s3").value) || 0;

  let best = Math.max(s1, s2, s3);

  if (best === s1) {
    document.getElementById("result").innerText = "👉 Upgrade Puits 1";
  } else if (best === s2) {
    document.getElementById("result").innerText = "👉 Upgrade Puits 2";
  } else {
    document.getElementById("result").innerText = "👉 Upgrade Puits 3";
  }
}
</script>

</body>
</html>
