<!DOCTYPE html>
<html>
<head>
  <title>Idle Miner Optimizer</title>
  <style>
    body {
      font-family: Arial;
      background: #121212;
      color: white;
      text-align: center;
      padding: 30px;
    }
    input {
      margin: 5px;
      padding: 8px;
      border-radius: 5px;
      border: none;
      width: 80px;
    }
    button {
      padding: 10px 20px;
      background: #00ff99;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      margin: 5px;
    }
    .box {
      background: #1e1e1e;
      padding: 20px;
      border-radius: 10px;
      display: inline-block;
    }
  </style>
</head>
<body>

<h1>⛏️ Idle Miner Optimizer</h1>

<div class="box">
  <h3>Puits</h3>
  <div id="shafts"></div>

  <button onclick="addShaft()">➕ Ajouter un puits</button>
  <br><br>

  <h3>Transport</h3>
  <input id="elevator" type="number" placeholder="Ascenseur"><br>
  <input id="warehouse" type="number" placeholder="Entrepôt"><br><br>

  <button onclick="calc()">🚀 Optimiser</button>

  <h2 id="result"></h2>
</div>

<script>
let shaftCount = 0;

function addShaft() {
  shaftCount++;
  let div = document.createElement("div");
  div.innerHTML = "Puits " + shaftCount + " : <input id='s"+shaftCount+"' type='number'><br>";
  document.getElementById("shafts").appendChild(div);
}

// Ajouter 3 puits au début
for (let i = 0; i < 3; i++) addShaft();

function calc() {
  let bestValue = 0;
  let bestShaft = 0;

  for (let i = 1; i <= shaftCount; i++) {
    let level = parseInt(document.getElementById("s"+i).value) || 0;

    // formule de rentabilité
    let value = Math.pow(level, 1.5);

    if (value > bestValue) {
      bestValue = value;
      bestShaft = i;
    }
  }

  if (bestShaft === 0) {
    document.getElementById("result").innerText = "Entre des valeurs !";
  } else {
    document.getElementById("result").innerText =
      "👉 Upgrade Puits " + bestShaft;
  }
}
</script>

</body>
</html>
