<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Optimiseur Idle Miner Tycoon</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Optimiseur Idle Miner Tycoon</h1>

  <!-- MENU MULTI-MINE -->
  <nav id="mineSelector"></nav>

  <section id="transport">
    <h2>Transport</h2>

    <div class="bloc">
      <p>Ascenseur — Niveau : <span id="elevatorLevel">1</span></p>
      <button onclick="upgradeElevator()">Upgrade Ascenseur</button>
    </div>

    <div class="bloc">
      <p>Dépôt — Niveau : <span id="warehouseLevel">1</span></p>
      <button onclick="upgradeWarehouse()">Upgrade Dépôt</button>
    </div>
  </section>

  <section id="mines">
    <h2>Puits</h2>

    <button onclick="ajouterMine()">Ajouter un puits</button>
    <p id="recommandation"></p>

    <div id="mineList"></div>
  </section>

  <script src="script.js?v=2"></script>
</body>
</html>
